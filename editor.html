<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCR Well Editor — SFKGSA</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #0f172a;
            color: #e2e8f0;
        }

        /* ── Map ───────────────────────────────── */
        #map { flex: 1; height: 100vh; }

        /* ── Editor panel (right side) ─────────── */
        .editor-panel {
            width: 420px;
            min-width: 420px;
            height: 100vh;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-header h1 {
            font-size: 15px;
            font-weight: 700;
            color: #f8fafc;
        }

        .reviewer-input {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-bottom: 1px solid #334155;
            font-size: 12px;
            color: #94a3b8;
        }

        .reviewer-input input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 4px 8px;
            color: #e2e8f0;
            font-size: 12px;
            outline: none;
        }

        .reviewer-input input:focus { border-color: #3b82f6; }

        /* ── Stats bar ─────────────────────────── */
        .stats-bar {
            padding: 10px 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            gap: 12px;
            font-size: 11px;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .stat-count { font-weight: 700; color: #f8fafc; }

        /* ── Filter tabs ───────────────────────── */
        .filter-tabs {
            display: flex;
            border-bottom: 1px solid #334155;
            padding: 0 16px;
        }

        .filter-tab {
            padding: 8px 12px;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .filter-tab:hover { color: #94a3b8; }
        .filter-tab.active { color: #3b82f6; border-bottom-color: #3b82f6; }

        /* ── Well list ─────────────────────────── */
        .well-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .well-card {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: border-color 0.15s;
        }

        .well-card:hover { border-color: #475569; }
        .well-card.selected { border-color: #3b82f6; background: #1e3a5f; }

        .well-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .well-card-title {
            font-size: 13px;
            font-weight: 600;
            color: #f8fafc;
        }

        .status-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .status-unreviewed { background: #374151; color: #9ca3af; }
        .status-verified { background: rgba(34,197,94,0.2); color: #4ade80; }
        .status-relocated { background: rgba(59,130,246,0.2); color: #60a5fa; }
        .status-inactive { background: rgba(239,68,68,0.2); color: #f87171; }
        .status-not_found { background: rgba(251,146,60,0.2); color: #fb923c; }

        .well-card-meta {
            font-size: 11px;
            color: #64748b;
        }

        /* ── Selected well detail ──────────────── */
        .detail-section {
            border-top: 1px solid #334155;
            padding: 16px;
            flex-shrink: 0;
        }

        .detail-section.hidden { display: none; }

        .detail-title {
            font-size: 14px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
        }

        .detail-label { color: #94a3b8; }
        .detail-value { color: #e2e8f0; font-weight: 500; }

        .detail-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #334155;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            background: #1e293b;
            color: #e2e8f0;
        }

        .btn:hover { background: #334155; }

        .btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }

        .btn-success { background: #16a34a; border-color: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }

        .btn-danger { background: #dc2626; border-color: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }

        .btn-warning { background: #d97706; border-color: #d97706; color: #fff; }
        .btn-warning:hover { background: #b45309; }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-select {
            width: 100%;
            padding: 6px 8px;
            font-size: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            outline: none;
            margin-bottom: 8px;
        }

        .status-select:focus { border-color: #3b82f6; }

        .notes-input {
            width: 100%;
            padding: 6px 8px;
            font-size: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #e2e8f0;
            outline: none;
            resize: vertical;
            min-height: 40px;
            margin-bottom: 8px;
        }

        .notes-input:focus { border-color: #3b82f6; }

        .view-wcr-link {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #60a5fa;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 5px;
            text-decoration: none;
            transition: all 0.15s;
        }

        .view-wcr-link:hover { background: rgba(59,130,246,0.2); }

        /* ── Relocate mode banner ──────────────── */
        .relocate-banner {
            padding: 10px 16px;
            background: #1e3a5f;
            border-bottom: 2px solid #3b82f6;
            font-size: 13px;
            color: #93c5fd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .relocate-banner.hidden { display: none; }

        .relocate-banner .btn { font-size: 11px; padding: 4px 10px; }

        /* ── Toast ─────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; }
        .toast.success { background: #16a34a; color: #fff; }
        .toast.error { background: #dc2626; color: #fff; }

        /* ── Popup ─────────────────────────────── */
        .map-popup {
            position: absolute;
            z-index: 20;
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: #e2e8f0;
            pointer-events: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .map-popup.hidden { display: none; }

        /* ── Crosshair cursor in relocate mode ── */
        .map-relocate .maplibregl-canvas { cursor: crosshair !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="editor-panel">
    <div class="editor-header">
        <h1>WCR Well Editor</h1>
        <span style="font-size:12px;color:#64748b" id="total-count"></span>
    </div>

    <div class="reviewer-input">
        <label>Reviewer:</label>
        <input type="text" id="reviewer-name" placeholder="Enter your name"
               value="">
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="filter-tabs">
        <div class="filter-tab active" data-filter="all">All</div>
        <div class="filter-tab" data-filter="unreviewed">Unreviewed</div>
        <div class="filter-tab" data-filter="verified">Verified</div>
        <div class="filter-tab" data-filter="relocated">Relocated</div>
        <div class="filter-tab" data-filter="inactive">Inactive</div>
        <div class="filter-tab" data-filter="not_found">Not Found</div>
    </div>

    <div id="relocate-banner" class="relocate-banner hidden">
        <span>Click on the map to set new location</span>
        <button class="btn" onclick="cancelRelocate()">Cancel</button>
    </div>

    <div class="well-list" id="well-list"></div>

    <div class="detail-section hidden" id="detail-section">
        <div class="detail-title" id="detail-title"></div>
        <div id="detail-info"></div>
        <div class="detail-actions" id="detail-actions"></div>
    </div>
</div>

<div id="popup" class="map-popup hidden"></div>
<div id="toast" class="toast"></div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script src="editor.js"></script>
</body>
</html>
